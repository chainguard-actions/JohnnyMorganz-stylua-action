name: Test basic StyLua usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a Lua file to check
        run: |
          mkdir -p /tmp/lua-test
          cat > /tmp/lua-test/hello.lua << 'EOF'
          local x = 1
          local y = 2
          local z = x + y
          print(z)
          EOF
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          version: latest
          args: --check /tmp/lua-test/hello.lua
        continue-on-error: true
      - name: Assert action ran (StyLua was invoked)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action should complete (either pass or fail formatting check)
          # We just verify it ran without a setup/download error
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran successfully"
