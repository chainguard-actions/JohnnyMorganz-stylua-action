name: Test basic usage - StyLua formatting check
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a Lua file to format-check
        run: |
          mkdir -p lua-src
          cat > lua-src/hello.lua << 'EOF'
          local function hello()
            print("hello world")
          end
          hello()
          EOF
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          version: "0.20.0"
          args: "--check lua-src/"
        continue-on-error: true
      - name: Assert action ran (check or format outcome)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action executed with outcome '$OUTCOME'"
          else
            echo "FAIL: unexpected outcome '$OUTCOME'"
            exit 1
          fi
