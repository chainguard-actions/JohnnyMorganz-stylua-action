name: Test basic usage - StyLua format check
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a properly formatted Lua file
        run: |
          mkdir -p /tmp/lua-test
          cat > /tmp/lua-test/hello.lua << 'EOF'
          local function greet(name)
              print("Hello, " .. name)
          end

          greet("world")
          EOF

      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          version: "0.20.0"
          args: "--check /tmp/lua-test/hello.lua"
        continue-on-error: true

      - name: Assert action ran (outcome is set)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ -z "$OUTCOME" ]; then
            echo "FAIL: expected outcome to be set"
            exit 1
          fi
          echo "PASS: action ran with outcome=$OUTCOME"
